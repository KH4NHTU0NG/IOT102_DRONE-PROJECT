# ============================================================
# docker-compose.yml — Windows 10/11 (Docker Desktop WSL2 backend)
# Bug fix #4: thêm restart: unless-stopped cho mọi service
# Bug fix #5: thêm named volumes để persist data
# ============================================================
# (Docker Compose v2 — không cần khai báo 'version')

services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: iot_mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  influxdb:
    image: influxdb:2.0
    container_name: iot_db
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=drone_org
      - DOCKER_INFLUXDB_INIT_BUCKET=drone_data
    volumes:
      - influxdb_data:/var/lib/influxdb2   # Bug fix #5: persist DB

  grafana:
    image: grafana/grafana:10.4.0
    container_name: iot_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
    volumes:
      - grafana_data:/var/lib/grafana       # Bug fix #5: persist dashboards

# Named volumes — data sống sót qua docker-compose restart
volumes:
  influxdb_data:
  grafana_data:
