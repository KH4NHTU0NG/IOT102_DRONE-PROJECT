# ============================================================
# docker-compose.yml — macOS Apple Silicon (ARM64)
# Grafana Provisioning: dashboard tự động load từ file JSON
# ============================================================
services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: iot_mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  influxdb:
    image: influxdb:2.0
    container_name: iot_db
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=drone_org
      - DOCKER_INFLUXDB_INIT_BUCKET=drone_data
    volumes:
      - influxdb_data:/var/lib/influxdb2

  grafana:
    image: grafana/grafana:10.4.0
    container_name: iot_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning          # Auto-load datasource
      - ./grafana/dashboards:/var/lib/grafana/dashboards          # Auto-load dashboard JSON

# Named volumes — data sống sót qua docker-compose restart
volumes:
  influxdb_data:
  grafana_data:

